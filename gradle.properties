# Gradle Configuration for Buildozer/Android Builds
# Optimized for CI environments with memory constraints

# JVM Memory - Limit to 1GB to avoid OOM in CI runners
org.gradle.jvmargs=-Xmx1024m -Xms256m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:G1NewCollectionOverheadPercent=20 -XX:G1MaxGCPauseMillis=50

# Disable Gradle daemon to prevent background processes
# (Important in CI where each job is independent)
org.gradle.daemon=false

# Disable parallel compilation to reduce memory usage
org.gradle.parallel=false

# Enable offline mode if needed
# org.gradle.offline=true

# Use local property files
org.gradle.configureondemand=true
