name: pyjnius Smoke Test (Fast Validation)

on:
  push:
    branches: [ main ]
    paths:
      - 'buildozer.spec'
      - '.github/workflows/pyjnius-smoke.yml'
      - '.github/workflows/android-*.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'buildozer.spec'
      - '.github/workflows/pyjnius-smoke.yml'
  workflow_dispatch:

jobs:
  pyjnius-smoke:
    runs-on: ubuntu-latest
    name: Validate pyjnius+Cython compilation (no APK packaging)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies (minimal)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            python3-setuptools
      
      - name: Cache buildozer/p4a artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-pyjnius-smoke-arm64-py3.10-${{ hashFiles('buildozer.spec', '.github/workflows/pyjnius-smoke.yml') }}
          restore-keys: |
            ${{ runner.os }}-pyjnius-smoke-arm64-py3.10-
            ${{ runner.os }}-pyjnius-smoke-arm64-
      
      - name: Install pinned Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir 'buildozer>=1.4.0'
          python -m pip install --no-cache-dir python-for-android
          # Force pin LAST so nothing upgrades it afterward
          python -m pip install --no-cache-dir --force-reinstall 'Cython==0.29.36'
          python -m pip show Cython
      
      - name: Verify pinned versions (STRICT - no tolerance)
        shell: bash
        run: |
          set -euo pipefail
          python -V
          python -m pip freeze | grep -E "^Cython==|^pyjnius==|^python-for-android==|^buildozer==" || true
          python -c "import Cython; print(Cython.__version__)"
          python -c "import Cython; assert Cython.__version__ == '0.29.36', f'Cython version mismatch: {Cython.__version__} != 0.29.36'"
      
      - name: Sanitize NDK/SDK environment
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "SANITIZING NDK/SDK ENVIRONMENT (Removing runner pollution)"
          echo "════════════════════════════════════════════════════════════════"
          
          # Unset runner-supplied variables
          unset ANDROID_NDK ANDROID_NDK_LATEST_HOME ANDROID_HOME || true
          
          # Set buildozer-controlled paths
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROIDNDK="$HOME/.buildozer/android/platform/android-ndk-r25b"
          export ANDROID_NDK_HOME="$ANDROIDNDK"
          export ANDROID_NDK_ROOT="$ANDROIDNDK"
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROIDNDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
          echo "✓ Environment sanitized"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Install Android SDK cmdline-tools (sdkmanager)
        shell: bash
        run: |
          set -euo pipefail
          : "${ANDROID_SDK_ROOT:?ANDROID_SDK_ROOT not set}"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -fsSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --version
      
      - name: Accept Android SDK licenses + install required packages
        shell: bash
        run: |
          set -euo pipefail
          # sdkmanager --licenses returns exit code 1 even when successful
          # Suppress output and ignore exit code
          (yes || true) | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0"
      
      - name: Download and install Android NDK r25b
        shell: bash
        run: |
          set -euo pipefail
          echo "════════════════════════════════════════════════════════════════"
          echo "DOWNLOADING ANDROID NDK r25b (Smoke Test Prerequisite)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          NDK_PLATFORM_DIR="$HOME/.buildozer/android/platform"
          NDK_DIR="$NDK_PLATFORM_DIR/android-ndk-r25b"
          
          # Check if already cached
          if [ -d "$NDK_DIR" ]; then
            CLANG="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
            if [ -x "$CLANG" ]; then
              echo "✓ NDK r25b already cached and valid: $NDK_DIR"
              echo "════════════════════════════════════════════════════════════════"
              echo ""
              exit 0
            else
              echo "⚠ Cached NDK corrupted (clang not executable)"
              echo "  Removing corrupted cache: $NDK_DIR"
              rm -rf "$NDK_DIR"
            fi
          fi
          
          # Download NDK r25b
          mkdir -p "$NDK_PLATFORM_DIR"
          cd "$NDK_PLATFORM_DIR"
          
          echo "[1. Downloading NDK r25b from Google repository...]"
          NDK_ZIP="android-ndk-r25b-linux.zip"
          curl -fsSL --continue-at - -o "$NDK_ZIP" \
            https://dl.google.com/android/repository/android-ndk-r25b-linux-x86_64.zip
          
          echo "✓ Download complete"
          echo ""
          
          echo "[2. Extracting NDK archive...]"
          unzip -q "$NDK_ZIP"
          rm "$NDK_ZIP"
          echo "✓ Extraction complete"
          echo ""
          
          # Verify extraction
          CLANG="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          if [ ! -x "$CLANG" ]; then
            echo "❌ CRITICAL: NDK extraction failed - clang not found at:"
            echo "   $CLANG"
            exit 1
          fi
          
          echo "[3. Verifying NDK toolchain...]"
          echo "✓ clang executable found: $CLANG"
          "$CLANG" --version | head -1
          echo ""
          
          echo "✅ NDK r25b ready for p4a toolchain"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Make smoke test script executable
        run: chmod +x scripts/ci_pyjnius_smoke.sh
      
      - name: Run pyjnius smoke test (p4a direct build)
        id: smoke_test
        continue-on-error: true
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "SMOKE TEST: pyjnius Compilation Validation"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Architecture: arm64-v8a (only arch supported by this project)"
          echo "Strategy: Use python-for-android toolchain directly"
          echo "          to build pyjnius recipe WITHOUT APK/Gradle assembly"
          echo ""
          echo "If the historical bug were present, this would fail with:"
          echo "  → jnius/jnius_utils.pxi:323:37: undeclared name not builtin: long"
          echo "  → clang: error: no such file or directory: 'jnius/jnius.c'"
          echo ""
          
          # Run smoke test script with proper exit code capture
          # Using PIPESTATUS[0] instead of $? because script uses tee internally
          set +e
          bash scripts/ci_pyjnius_smoke.sh arm64-v8a 21 | tee pyjnius_smoke_arm64-v8a.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          
          echo "Captured exit code: $TEST_EXIT"
          echo "test_exit_code=$TEST_EXIT" >> "$GITHUB_OUTPUT"
          echo "TEST_EXIT=$TEST_EXIT" >> "$GITHUB_ENV"
          exit $TEST_EXIT
      
      - name: Upload smoke test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyjnius-smoke-logs-arm64-v8a
          path: pyjnius_smoke_arm64-v8a.log
          if-no-files-found: warn
          retention-days: 14
      
      - name: Evaluate smoke test result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          EXIT_CODE="${{ steps.smoke_test.outputs.test_exit_code }}"
          if [ -z "$EXIT_CODE" ]; then
            EXIT_CODE="${TEST_EXIT:-1}"
          fi
          echo "Exit code: $EXIT_CODE"
          case "$EXIT_CODE" in
            0) exit 0 ;;
            1|2) exit 1 ;;
            *) exit 1 ;;
          esac
      
      - name: Smoke test summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "SMOKE TEST SUMMARY"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Purpose: Validate Cython 0.29.36 + pyjnius 1.6.1"
          echo "         compiles WITHOUT the historical bug"
          echo ""
          echo "Historical bug symptoms:"
          echo "  • jnius/jnius_utils.pxi:323:37: undeclared name not builtin: long"
          echo "  • clang: error: no such file or directory: 'jnius/jnius.c'"
          echo ""
          echo "What this test does:"
          echo "  ✓ Verifies exact Cython version (0.29.36)"
          echo "  ✓ Uses p4a toolchain directly (NOT buildozer android debug)"
          echo "  ✓ Compiles pyjnius recipe for arm64-v8a with Cython"
          echo "  ✓ Stops BEFORE Gradle/APK assembly"
          echo "  ✓ Requires positive evidence (not just absence of errors)"
          echo ""
          echo "Why single architecture:"
          echo "  • buildozer.spec defines: android.archs = arm64-v8a"
          echo "  • armeabi-v7a explicitly marked as incompatible"
          echo "  • Testing one arch is sufficient to validate Cython/pyjnius fix"
          echo ""
          echo "Exit codes:"
          echo "  0 = Success (pyjnius compiled)"
          echo "  1 = Failure (bug detected or inconclusive)"
          echo ""
          echo "Logs uploaded as artifact: pyjnius-smoke-logs-arm64-v8a"
          echo "════════════════════════════════════════════════════════════════"
