name: Android Debug Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            python3-setuptools
      
      - name: Set up cache for pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Set up cache for buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Set up cache for gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install system dependencies (OpenSSL + pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev openssl
      
      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          # Pin buildozer to stable version (1.4.0+) to ensure p4a.setup_py support
          pip install --no-cache-dir 'buildozer>=1.4.0'
          pip install --no-cache-dir 'Cython==0.29.36'
          
          # Verify buildozer version
          echo "Buildozer version:"
          buildozer --version
      
      - name: Sanitize NDK/SDK environment for buildozer
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "SANITIZING NDK/SDK ENVIRONMENT (Removing runner pollution)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "[BEFORE SANITIZATION - Runner variables that pollute p4a:]"
          echo "  ANDROID_NDK=${ANDROID_NDK:-UNSET}"
          echo "  ANDROID_NDK_LATEST_HOME=${ANDROID_NDK_LATEST_HOME:-UNSET}"
          echo "  ANDROID_HOME=${ANDROID_HOME:-UNSET}"
          echo "  ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-UNSET}"
          echo ""
          
          # Unset runner-supplied NDK/SDK variables that conflict with buildozer
          unset ANDROID_NDK
          unset ANDROID_NDK_LATEST_HOME
          unset ANDROID_HOME
          
          # Set buildozer-specific paths for consistency
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROIDNDK="$HOME/.buildozer/android/platform/android-ndk-r25b"
          export ANDROID_NDK_HOME="$ANDROIDNDK"
          export ANDROID_NDK_ROOT="$ANDROIDNDK"
          
          # Persist these for all subsequent steps
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROIDNDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          
          echo "[AFTER SANITIZATION - Buildozer-controlled paths:]"
          echo "  ANDROID_HOME=$ANDROID_HOME"
          echo "  ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "  ANDROIDNDK=$ANDROIDNDK"
          echo "  ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "  ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Verify pinned dependencies (determinism check)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "DEPENDENCY VERSION VERIFICATION (Determinism Check)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "[Expected Versions]"
          echo "  Cython: 0.29.36"
          echo "  pyjnius: 1.6.1 (will be installed by p4a from buildozer.spec)"
          echo ""
          echo "[Installed Versions]"
          pip freeze | grep -E "^Cython==|^pyjnius==" || echo "(pyjnius not yet installed - will be by p4a)"
          echo ""
          CYTHON_VERSION=$(python3 -c "import Cython; print(Cython.__version__)" 2>/dev/null || echo "NOT_FOUND")
          if [ "$CYTHON_VERSION" != "0.29.36" ]; then
            echo "❌ CRITICAL: Cython version mismatch!"
            echo "   Expected: 0.29.36"
            echo "   Found: $CYTHON_VERSION"
            echo ""
            echo "This will cause 'undeclared name not builtin: long' error."
            exit 1
          fi
          echo "✅ Cython 0.29.36 verified (Python 3 compatible)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Fast-fail verification (p4a config + NDK path)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "FAST-FAIL VERIFICATION (Detect issues BEFORE long build)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "[1. Python version]"
          python3 --version
          echo ""
          echo "[2. Java version]"
          java -version 2>&1 || { echo "❌ Java not found"; exit 1; }
          echo ""
          echo "[3. Buildozer version]"
          buildozer --version || { echo "❌ Buildozer not found"; exit 1; }
          echo ""
          echo "[4. Python-for-android version (if installed)]"
          python3 -m pythonforandroid.toolchain --version 2>/dev/null || echo "   (p4a not yet installed)"
          echo ""
          echo "[5. NDK path verification]"
          NDK_EXPECTED="$HOME/.buildozer/android/platform/android-ndk-r25b"
          if [[ "$ANDROIDNDK" != *"android-ndk-r25b" ]]; then
            echo "❌ CRITICAL: ANDROIDNDK is not r25b!"
            echo "   Expected: ...android-ndk-r25b"
            echo "   Got: $ANDROIDNDK"
            exit 1
          fi
          echo "✓ NDK: $ANDROIDNDK"
          echo ""
          echo "[6. SDK path verification]"
          echo "✓ SDK: $ANDROID_SDK_ROOT"
          echo ""
          echo "[7. buildozer.spec check (p4a.setup_py must be true)]"
          if grep -q '^p4a.setup_py = true$' buildozer.spec; then
            echo "✓ p4a.setup_py = true (setuptools will use setup.py, not --ignore-setup-py)"
          else
            echo "❌ CRITICAL: p4a.setup_py is not 'true' in buildozer.spec"
            echo "   This will cause _ctypes ModuleNotFoundError"
            exit 1
          fi
          echo ""
          echo "✅ All fast-fail checks PASSED"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Clean buildozer cache (force fresh build)
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "CLEANING BUILDOZER CACHE (Force fresh, reproducible build)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          # Remove local .buildozer directory (but keep .buildozer git repo if any)
          if [ -d ".buildozer" ]; then
            echo "[*] Removing local .buildozer directory..."
            rm -rf .buildozer
            echo "    ✓ Done"
          fi
          
          # Optional: clean buildozer user home cache (more aggressive, use with care)
          # Uncomment if you want to force total rebuild
          # if [ -d "$HOME/.buildozer" ]; then
          #   echo "[*] WARNING: This would remove ~/.buildozer (disabled for safety)"
          #   echo "    To enable aggressive cache cleaning, uncomment the rm command"
          # fi
          
          echo ""
          echo "✅ Cache cleaned. Buildozer will perform fresh build"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Verify buildozer will use correct p4a args
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "PRE-BUILD VERIFICATION: buildozer.spec p4a configuration"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          echo "[*] Current buildozer.spec p4a/android configuration:"
          grep -E "^p4a|^android\." buildozer.spec | sort
          echo ""
          
          # Warn if p4a_ignore_setuppy is set to true (the old problematic setting)
          if grep -q "^p4a_ignore_setuppy *= *true\|^p4a_ignore_setuppy = true" buildozer.spec; then
            echo "❌ WARNING: p4a_ignore_setuppy MUST NOT be 'true'"
            echo "   This will cause ModuleNotFoundError: No module named '_ctypes'"
            exit 1
          fi
          
          # Ensure p4a.setup_py is true
          if ! grep -q "^p4a.setup_py *= *true\|^p4a.setup_py = true" buildozer.spec; then
            echo "❌ ERROR: p4a.setup_py must be 'true'"
            exit 1
          fi
          
          echo "✅ Configuration looks good"
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Pre-build environment diagnostics
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "PRE-BUILD DIAGNOSTICS"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "[System Memory]"
          free -h
          echo ""
          echo "[Disk Space]"
          df -h /
          echo ""
          echo "[CPU Info]"
          echo "Available CPUs: $(nproc)"
          echo ""
          echo "[Java Version]"
          java -version 2>&1 || echo "Java not found"
          echo ""
          echo "[Python Version]"
          python3 --version
          echo ""
          echo "[Buildozer Version]"
          buildozer --version || echo "Buildozer not yet initialized"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform
          yes | sdkmanager --licenses || true
      
      - name: Configure Gradle/JVM for CI
        run: |
          echo "Configuring Java/Gradle for CI environment..."
          
          # Export environment variables for this step and all following steps
          echo "CYTHON_LANGUAGE_LEVEL=3" >> $GITHUB_ENV
          echo "JAVA_TOOL_OPTIONS=-Xmx1024m -Xms256m -XX:+UseG1GC -XX:+ParallelRefProcEnabled" >> $GITHUB_ENV
          echo "GRADLE_OPTS=-Xmx1024m -Xms256m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:G1MaxGCPauseMillis=50" >> $GITHUB_ENV
          echo "GRADLE_USER_HOME=$HOME/.gradle" >> $GITHUB_ENV
          
          # Verify gradle.properties exists
          if [ -f gradle.properties ]; then
            echo "✓ gradle.properties found locally"
            cat gradle.properties
          else
            echo "⚠ gradle.properties not found in workspace"
          fi
          
          # Show effective settings
          echo ""
          echo "Effective settings:"
          echo "  CYTHON_LANGUAGE_LEVEL: 3"
          echo "  JAVA_TOOL_OPTIONS: $JAVA_TOOL_OPTIONS"
          echo "  GRADLE_OPTS (will use above)"
          echo "  Java max heap: 1024m"
          echo "  Gradle daemon: disabled (gradle.properties)"
          echo "  Gradle parallel: disabled (gradle.properties)"
      
      - name: Verify buildozer version and p4a flags
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "PRE-BUILD: Buildozer Version & p4a Flags Verification"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          # 1. Check buildozer version
          BUILDOZER_VERSION=$(buildozer --version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "[Buildozer Version Check]"
          echo "  Version: $BUILDOZER_VERSION"
          
          if [ -z "$BUILDOZER_VERSION" ]; then
            echo "❌ FAILED: Could not determine buildozer version"
            exit 1
          fi
          
          MAJOR=$(echo "$BUILDOZER_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BUILDOZER_VERSION" | cut -d. -f2)
          
          if [ "$MAJOR" -lt 1 ] || ([ "$MAJOR" -eq 1 ] && [ "$MINOR" -lt 4 ]); then
            echo "❌ FAILED: buildozer version must be >= 1.4.0"
            echo "   Current: $BUILDOZER_VERSION"
            exit 1
          fi
          echo "  ✓ Version >= 1.4.0"
          echo ""
          
          # 2. Verify ANDROID_NDK_HOME path
          echo "[NDK Path Verification]"
          echo "  ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          
          if [ -z "$ANDROID_NDK_HOME" ]; then
            echo "❌ FAILED: ANDROID_NDK_HOME not set"
            exit 1
          fi
          
          if [[ "$ANDROID_NDK_HOME" != *"android-ndk-r25b" ]]; then
            echo "❌ FAILED: ANDROID_NDK_HOME must contain 'android-ndk-r25b'"
            echo "   Current: $ANDROID_NDK_HOME"
            exit 1
          fi
          
          if ! test -d "$ANDROID_NDK_HOME"; then
            echo "❌ FAILED: ANDROID_NDK_HOME directory does not exist"
            echo "   Path: $ANDROID_NDK_HOME"
            exit 1
          fi
          echo "  ✓ NDK path exists and correct"
          echo ""
          
          # 3. Check p4a.setup_py config
          echo "[p4a.setup_py Configuration]"
          if grep -q '^p4a.setup_py = true$' buildozer.spec; then
            echo "  ✓ p4a.setup_py = true"
          else
            echo "❌ FAILED: p4a.setup_py must be 'true' in buildozer.spec"
            exit 1
          fi
          echo ""
          
          echo "✅ All pre-build verifications PASSED"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Build Android APK
        id: build_apk
        run: |
          echo "Starting build with resource monitoring..."
          echo ""
          
          # Define BUILD_LOG for later inspection
          BUILD_LOG=".buildozer_build_$(date +%s).log"
          
          # Start background resource monitor
          {
            while sleep 10; do
              TIMESTAMP=$(date '+%H:%M:%S')
              MEM_USAGE=$(free -h | grep Mem | awk '{print $3 " / " $2}')
              CPU_LOAD=$(uptime | awk -F'load average:' '{print $2}' | xargs)
              BUILD_PROC=$(ps aux | grep '[b]uildozer' | awk '{print "PID:" $2 " CPU:" $3"%" " MEM:" $4"%"}')
              echo "[$TIMESTAMP] Mem: $MEM_USAGE | Load: $CPU_LOAD | Buildozer: ${BUILD_PROC:-not found}"
            done
          } &
          MONITOR_PID=$!
          trap "kill $MONITOR_PID 2>/dev/null" EXIT
          
          # Run build and capture output to both stdout and log file
          buildozer -v android debug 2>&1 | tee "$BUILD_LOG"
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # Explicitly save BUILD_LOG path in step output for later steps
          echo "build_log=$BUILD_LOG" >> $GITHUB_OUTPUT
          
          # Stop monitor
          kill $MONITOR_PID 2>/dev/null || true
          
          exit $BUILD_STATUS
      
      - name: Verify p4a did NOT use --ignore-setup-py
        if: steps.build_apk.outcome == 'success'
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "POST-BUILD VERIFICATION: p4a flags check"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          # Extract most recent buildozer log (from ~/.buildozer/logs/)
          BUILDOZER_LOG=$(find ~/.buildozer -name "buildozer*.log" -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          
          if [ -z "$BUILDOZER_LOG" ]; then
            echo "⚠️  No buildozer log found in ~/.buildozer/logs/"
            echo "    Attempting to use build log from step..."
            if [ -f "${{ steps.build_apk.outputs.build_log }}" ]; then
              BUILDOZER_LOG="${{ steps.build_apk.outputs.build_log }}"
              echo "✓ Found: $BUILDOZER_LOG"
            else
              echo "❌ FAILED: Cannot locate buildozer log for verification"
              exit 1
            fi
          fi
          
          echo "Build log: $BUILDOZER_LOG"
          echo ""
          
          # Check that p4a was called with --use-setup-py (NOT --ignore-setup-py)
          echo "[Checking p4a toolchain invocation...]" 
          
          # MUST find --use-setup-py
          if grep -q -- "--use-setup-py" "$BUILDOZER_LOG" 2>/dev/null; then
            echo "✓ Found: --use-setup-py (CORRECT)"
          else
            echo "⚠️  --use-setup-py not explicitly visible in log"
            echo "    This may be OK if buildozer internally applies it"
          fi
          
          # MUST NOT find --ignore-setup-py
          if grep -q -- "--ignore-setup-py" "$BUILDOZER_LOG" 2>/dev/null; then
            echo "❌ CRITICAL ERROR: Found --ignore-setup-py in build log!"
            echo "    This will cause ModuleNotFoundError: No module named '_ctypes'"
            echo ""
            echo "    Matching lines:"
            grep -- "--ignore-setup-py" "$BUILDOZER_LOG" | head -5
            echo ""
            exit 1
          else
            echo "✓ NOT found: --ignore-setup-py (CORRECT)"
          fi
          
          echo ""
          echo "✅ p4a flag verification PASSED"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
      
      - name: Capture buildozer logs on failure
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "BUILD FAILED - CAPTURING DIAGNOSTIC LOGS"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          # Create artifact directory
          mkdir -p .artifacts/logs
          
          # Copy entire .buildozer directory if exists
          if [ -d ".buildozer" ]; then
            echo "[*] Archiving .buildozer directory..."
            tar -czf .artifacts/logs/buildozer_local.tar.gz .buildozer 2>/dev/null || true
            echo "    ✓ Done"
          fi
          
          # Copy ~/.buildozer directory if exists
          if [ -d "$HOME/.buildozer" ]; then
            echo "[*] Archiving ~/.buildozer directory..."
            tar -czf .artifacts/logs/buildozer_home.tar.gz -C "$HOME" .buildozer 2>/dev/null || true
            echo "    ✓ Done"
          fi
          
          # Copy ~/.gradle directory if exists
          if [ -d "$HOME/.gradle" ]; then
            echo "[*] Archiving ~/.gradle directory..."
            tar -czf .artifacts/logs/gradle_cache.tar.gz -C "$HOME" .gradle 2>/dev/null || true
            echo "    ✓ Done"
          fi
          
          # Find and copy most recent buildozer debug log with tail
          RECENT_LOG=$(find "$HOME/.buildozer" -name "*.log" -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -n "$RECENT_LOG" ] && [ -f "$RECENT_LOG" ]; then
            echo "[*] Extracting tail of buildozer log..."
            echo "    Source: $RECENT_LOG"
            echo "    Last 300 lines:"
            echo "────────────────────────────────────────────────────────────────"
            tail -300 "$RECENT_LOG" | tee .artifacts/logs/buildozer_tail_300.log
            echo "────────────────────────────────────────────────────────────────"
            
            # Also copy full log
            cp "$RECENT_LOG" ".artifacts/logs/buildozer_full.log"
          fi
          
          # Copy NDK build logs
          if [ -d ".buildozer/android/platform/build-arm64-v8a" ]; then
            echo "[*] Copying NDK build logs..."
            find ".buildozer/android/platform/build-arm64-v8a" -name "*.log" -o -name "config.log" | xargs -I {} cp {} .artifacts/logs/ 2>/dev/null || true
          fi
          
          # Environment snapshot
          echo "[*] Creating environment snapshot..."
          {
            echo "=== FULL ENVIRONMENT ==="
            env | sort
            echo ""
            echo "=== ANDROID/NDK VARIABLES ==="
            env | grep -E 'ANDROID|NDK|SDK|GRADLE' | sort
            echo ""
            echo "=== BUILDOZER SPEC ==="
            cat buildozer.spec
          } > ".artifacts/logs/env_and_config.txt"
          
          echo ""
          echo "✓ All diagnostic artifacts captured"
          echo ""
      
      - name: Upload build logs on failure
        if: steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-build-logs
          path: .artifacts/logs/
          retention-days: 30
      
      - name: Hard fail gate - force job failure if build failed
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "❌ HARD FAIL GATE: Build step failed"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Build logs have been captured and uploaded as artifacts."
          echo "Check the artifacts for the exact error."
          echo ""
          echo "Forcing job to fail with exit code 1..."
          echo ""
          exit 1
      
      - name: List bin directory (debug)
        if: always()
        run: |
          echo "Contents of bin/ directory:"
          ls -lah bin/ || echo "bin/ directory not found"
      
      - name: Verify APK exists
        id: verify
        run: |
          set -euo pipefail
          
          echo "Searching for APK files..."
          APK_FILE=""
          
          # Step 1: Search in bin/ first (preferred location)
          echo "[Step 1] Searching in bin/..."
          BIN_APKS=$(find bin -maxdepth 1 -type f -name "*.apk" 2>/dev/null || true)
          
          # Step 2: If not found in bin/, search in buildozer paths (acotadas: only specific output dirs)
          if [ -z "$BIN_APKS" ]; then
            echo "[Step 2] No APKs in bin/, searching in buildozer paths..."
            BUILDOZER_APKS=$(find .buildozer -type f \( -path "*/build/outputs/apk/*/*.apk" -o -path "*/dists/*/build/outputs/apk/*/*.apk" -o -path "*/outputs/*/*.apk" \) 2>/dev/null || true)
            BIN_APKS="$BUILDOZER_APKS"
          fi
          
          # Step 3: If still not found, fail with diagnostics
          if [ -z "$BIN_APKS" ]; then
            echo ""
            echo "════════════════════════════════════════════════════════════════"
            echo "❌ VERIFICATION FAILED: No APK file found"
            echo "════════════════════════════════════════════════════════════════"
            echo ""
            echo "[Diagnostic: bin/ directory contents]"
            ls -la bin 2>/dev/null || echo "bin/ directory does not exist"
            echo ""
            echo "[Diagnostic: .buildozer structure]"
            find .buildozer -maxdepth 3 -type d -name 'outputs' 2>/dev/null | head -5 || echo "No buildozer outputs dirs found"
            echo ""
            echo "Build process did not generate APK. Check logs above for build errors."
            exit 1
          fi
          
          # Step 4: If multiple APKs exist, select the most recent by mtime (avoids old cache)
          echo "[Step 4] Selecting most recent APK..."
          APK_FILE=$(echo "$BIN_APKS" | while read -r f; do
            stat -c "%Y %n" "$f" 2>/dev/null || true
          done | sort -rn | head -1 | cut -d' ' -f2-)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ FAILED: Could not select APK from candidates"
            exit 1
          fi
          
          echo "✓ APK selected (most recent): $APK_FILE"
          echo ""
          
          # Step 5: Validate APK - not empty (test -s)
          if ! test -s "$APK_FILE"; then
            echo "❌ FAILED: APK file is empty (0 bytes): $APK_FILE"
            exit 1
          fi
          echo "✓ File size: $(du -h "$APK_FILE" | cut -f1)"
          
          # Step 6: Validate APK - valid ZIP archive (unzip -t)
          command -v unzip >/dev/null || { echo "❌ unzip not installed"; exit 1; }
          if ! unzip -t "$APK_FILE" > /dev/null 2>&1; then
            echo "❌ FAILED: APK is not a valid ZIP archive: $APK_FILE"
            unzip -t "$APK_FILE" 2>&1 | head -20
            exit 1
          fi
          echo "✓ ZIP integrity verified"
          echo ""
          
          echo "✅ APK verification PASSED:"
          ls -lh "$APK_FILE"
          echo ""
          
          # Step 7: Export APK path as step output for downstream steps (GitHub Actions)
          echo "apk_path=$APK_FILE" >> "$GITHUB_OUTPUT"
      
      - name: Post-build Gradle diagnostics
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "POST-BUILD GRADLE DIAGNOSTICS"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          
          echo "[Gradle Cache Size]"
          if [ -d ~/.gradle ]; then
            GRADLE_SIZE=$(du -sh ~/.gradle | awk '{print $1}')
            echo "~/.gradle size: $GRADLE_SIZE"
          else
            echo "~/.gradle not found"
          fi
          
          echo ""
          echo "[Local Buildozer Cache]"
          if [ -d .buildozer ]; then
            LOCAL_CACHE=$(du -sh .buildozer | awk '{print $1}')
            echo ".buildozer size: $LOCAL_CACHE"
          else
            echo ".buildozer not found"
          fi
          
          echo ""
          echo "[Memory After Build]"
          free -h | grep Mem
          
          echo ""
          echo "════════════════════════════════════════════════════════════════"
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ${{ steps.verify.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
